<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Njuwa WiFi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0f1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      padding: 24px;
    }
    .bg-circles { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
    .circle { position: absolute; border-radius: 50%; opacity: 0.15; }
    .circle-1 { width: 500px; height: 500px; background: #6c63ff; top: -150px; right: -150px; }
    .circle-2 { width: 400px; height: 400px; background: #00c896; bottom: -100px; left: -100px; }
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px; padding: 40px 32px;
      max-width: 380px; width: 100%; text-align: center;
      backdrop-filter: blur(12px);
    }
    .wifi-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6c63ff, #00c896);
      border-radius: 20px; display: flex;
      align-items: center; justify-content: center;
      margin: 0 auto 24px;
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(108,99,255,0.3); }
      50% { box-shadow: 0 0 40px rgba(108,99,255,0.6); }
    }
    .wifi-icon svg { width: 38px; height: 38px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .subtitle { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 32px; line-height: 1.5; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 32px; }
    .spinner { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #6c63ff; border-right-color: #00c896; border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #6c63ff, #00c896); border-radius: 2px; animation: progress 2.5s ease-in-out forwards; }
    @keyframes progress { 0% { width: 0; } 100% { width: 100%; } }
    .status-text { font-size: 14px; color: rgba(255,255,255,0.6); letter-spacing: 0.02em; }
    .brand { position: relative; z-index: 1; margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="bg-circles">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
  </div>

  <div class="card">
    <div class="wifi-icon">
      <svg viewBox="0 0 24 24">
        <path d="M5 12.55a11 11 0 0 1 14.08 0" />
        <path d="M1.42 9a16 16 0 0 1 21.16 0" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>

    <h1>Njuwa WiFi</h1>
    <p class="subtitle">Connecting you to the internet.<br>Please wait a moment…</p>

    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <p class="status-text">Loading portal…</p>
    </div>
  </div>

  <p class="brand">Powered by M-Pesa · Daraja API</p>

  <script>
    // ──────────────────────────────────────────
    // Capture ALL MikroTik hotspot variables and
    // forward them to the hosted captive portal.
    // ──────────────────────────────────────────
    (function () {
      // ── CONFIGURATION ──
      // Change this to your Lovable app URL
      var PORTAL = "https://stk-pay-magic.lovable.app/portal";

      // Grab every query-string parameter the router sends
      var raw = window.location.search;          // ?link-login=…&mac=…&ip=…
      var params = new URLSearchParams(raw);

      // Build the portal URL preserving all MikroTik params
      var portalUrl = PORTAL;
      if (raw && raw.length > 1) {
        portalUrl = PORTAL + raw;                // append ?link-login=…&…
      }

      // Redirect after a short delay so the animation plays
      setTimeout(function () {
        window.location.href = portalUrl;
      }, 2500);
    })();
  </script>
</body>
</html>
